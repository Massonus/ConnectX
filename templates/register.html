<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>

<div>
    <div class="border">
        <div class="header">
            <h1 class="word">Register</h1>
        </div>
        <h2 class="word"></h2>
        <form action="{{ url_for('register') }}" method="post">
            <div class="msg">{{ msg }}</div>
            <input id="username" name="username" type="text" placeholder="Enter Your Username" class="textbox"/>
            <input id="password" name="password" type="password" placeholder="Enter Your Password" class="textbox"/>
            <input type="submit" class="btn" value="Sign Up">
        </form>

        <p class="bottom">Already have an account? <a class="bottom" href="{{ url_for('login') }}"> Sign In here</a></p>
    </div>
</div>
</body>
</html>
